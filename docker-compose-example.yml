services:
  server:
    image: yooooomi/your_spotify_server
    restart: always
    ports:
      - "8080:8080"
    links:
      - mongo
    depends_on:
      - mongo
    environment:
      API_ENDPOINT: http://127.0.0.1:8080
      CLIENT_ENDPOINT: http://127.0.0.1:3000
      EMAIL: __spotify_email__
      COOKIES: __spotify_cookies__

  mongo:
    container_name: mongo
    image: mongo:6
    restart: always
    volumes:
      - ./your_spotify_db:/data/db

  web:
    image: yooooomi/your_spotify_client
    restart: always
    ports:
      - "3000:3000"
    environment:
      API_ENDPOINT: http://127.0.0.1:8080
